# E1-B: Video-only baseline
model:
  name: baseline_video
  video_dim: 1280  # Wan VAE latent or DiT hidden state dim
  hidden_dim: 256
  num_layers: 4
  num_heads: 8
  temporal_pool: mean  # mean, attention
  spatial_pool: perceiver  # mean, perceiver

  video_feature_source: vae_latent  # vae_latent, dit_shallow, dit_middle, dit_deep

decoder:
  joint_type_classes: 3
  axis_dim: 3
  pivot_dim: 3
  state_dim: 2

training:
  lr: 1.0e-4
  weight_decay: 1.0e-5
  epochs: 100
  batch_size: 16
  scheduler: cosine
  warmup_epochs: 5

loss:
  lambda_type: 1.0
  lambda_axis: 5.0
  lambda_pivot: 2.0
  lambda_state: 1.0
